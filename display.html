<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <title>Speaker Display</title>

  <style>
    :root {
      --bg-normal: #000000;
      --bg-alert: #8b0000;

      --notes-alert: #ff8800;
      --msg-alert: #8b0000;

      --text-normal: #ffffff;
      --divider: rgba(255,255,255,0.25);
    }

    body {
      margin: 0;
      background: var(--bg-normal);
      color: var(--text-normal);
      font-family: system-ui, sans-serif;
      height: 100vh;
      display: grid;
      grid-template-columns: 0.6fr 2.8fr 0.6fr;
      grid-template-areas: "left center right";
    }

    /* LEFT */
    #left {
      grid-area: left;
      padding: 20px;
      border-right: 1px solid var(--divider);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 25px;
    }

    #clock {
      font-size: 3vw;
      font-weight: 700;
    }

    #countdown {
      font-size: 3vw;
      font-weight: 800;
      color: #ff4d4d;
      border-top: 1px solid var(--divider);
      padding-top: 15px;
    }

    /* CENTER */
    #center {
      grid-area: center;
      display: flex;
      justify-content: center;
      align-items: center;
      border-left: 1px solid var(--divider);
      border-right: 1px solid var(--divider);
      position: relative;
      overflow: hidden;
    }

    #mainMsg {
      font-size: 4vw;
      max-width: 90%;
      text-align: center;
      padding: 18px 24px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
    }

    /* ALERTA mensagem (pisca vermelho só no center) */
    .msg-bg-blink{
      animation: msgBgBlink 3s linear forwards;
    }
    @keyframes msgBgBlink{
      0%   { background-color: transparent; }
      10%  { background-color: var(--msg-alert); }
      20%  { background-color: transparent; }
      30%  { background-color: var(--msg-alert); }
      40%  { background-color: transparent; }
      50%  { background-color: var(--msg-alert); }
      60%  { background-color: transparent; }
      70%  { background-color: var(--msg-alert); }
      80%  { background-color: transparent; }
      90%  { background-color: var(--msg-alert); }
      100% { background-color: transparent; }
    }

    /* RIGHT – NOTAS */
    #right {
      grid-area: right;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: background-color 0.2s;
    }

    #notesTitle {
      font-weight: 600;
      font-size: 1.4vw;
      opacity: 0.8;
    }

    #notesText {
      font-size: 1.6vw;
      max-width: 90%;
    }

    /* ALERTA NOTAS – pisca ~3s */
    .notes-bg-blink {
      animation: notesBgBlink 3s linear forwards;
    }

    @keyframes notesBgBlink {
      0%   { background-color: transparent; }
      10%  { background-color: var(--notes-alert); }
      20%  { background-color: transparent; }
      30%  { background-color: var(--notes-alert); }
      40%  { background-color: transparent; }
      50%  { background-color: var(--notes-alert); }
      60%  { background-color: transparent; }
      70%  { background-color: var(--notes-alert); }
      80%  { background-color: transparent; }
      90%  { background-color: var(--notes-alert); }
      100% { background-color: transparent; }
    }
  </style>
</head>

<body>

  <div id="left">
    <div id="clock">--:--:--</div>
    <div id="countdown">--:--</div>
  </div>

  <div id="center">
    <div id="mainMsg">Aguardando mensagem…</div>
  </div>

  <div id="right">
    <div id="notesTitle">Notas</div>
    <div id="notesText">Sem notas.</div>
  </div>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="app-display.js"></script>
</body>
</html>
