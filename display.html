<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speaker Display</title>
  <style>
    :root{
      --bg-normal:#000000;
      --bg-alert:#8b0000;
      --text-normal:#ffffff;
      --divider:rgba(255,255,255,0.25);
      --notes-alert:#ff8800; /* LARANJA */
    }

    body{
      margin:0;
      background:var(--bg-normal);
      color:var(--text-normal);
      font-family:system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      height:100vh;
      display:grid;
      grid-template-columns:0.6fr 2.8fr 0.6fr;
      grid-template-areas:"left center right";
    }

    #left{
      grid-area:left;
      padding:20px;
      border-right:1px solid var(--divider);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:25px;
    }

    #clock{ font-size:3vw; font-weight:700; }
    #countdown{
      font-size:3vw;
      font-weight:800;
      color:#ff4d4d;
      border-top:1px solid var(--divider);
      padding-top:15px;
    }

    #center{
      grid-area:center;
      display:flex;
      justify-content:center;
      align-items:center;
      border-left:1px solid var(--divider);
      border-right:1px solid var(--divider);
    }

    #mainMsg{
      font-size:4vw;
      color:#fff;
      max-width:90%;
      text-align:center;
      line-height:1.05;
    }

    .blink{ animation: blinkAnim 0.4s steps(2, start) 3s; }
    @keyframes blinkAnim{ 50%{ opacity:0; } }

    #right{
      grid-area:right;
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:10px;
      transition:background 0.2s;
    }

    #notesTitle{
      font-weight:700;
      font-size:1.4vw;
      opacity:0.8;
    }

    #notesText{
      font-size:1.6vw;
      max-width:90%;
      line-height:1.15;
      opacity:0.95;
    }

    /* Pisca laranja durante 3s */
    .notes-bg-blink{ animation: notesBgBlink 0.4s steps(2, start) 3s; }
    @keyframes notesBgBlink{
      0%{ background-color: transparent; }
      50%{ background-color: var(--notes-alert); }
      100%{ background-color: transparent; }
    }
  </style>
</head>
<body>

  <div id="left">
    <div id="clock">--:--:--</div>
    <div id="countdown">--:--</div>
  </div>

  <div id="center">
    <div id="mainMsg">A aguardar mensagem…</div>
  </div>

  <div id="right">
    <div id="notesTitle">Notas</div>
    <div id="notesText">Sem notas.</div>
  </div>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="./app-display.js"></script>
</body>
</html>
