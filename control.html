<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speaker Control</title>

  <style>
    :root{
      --bg:#0b0f1a;
      --panel: rgba(0,0,0,.22);
      --stroke: rgba(255,255,255,.14);
      --text: rgba(255,255,255,.96);
      --muted: rgba(255,255,255,.70);
      --shadow: rgba(0,0,0,.45);

      --accent:#60a5fa;
      --danger:#ff335c;
      --warn:#f59e0b;

      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background:
        radial-gradient(900px 500px at 20% 10%, rgba(96,165,250,0.22), transparent),
        radial-gradient(800px 450px at 90% 30%, rgba(245,158,11,0.16), transparent),
        var(--bg);
      color: var(--text);
      padding: 22px;
    }

    .wrap{
      max-width: 1180px;
      margin: 0 auto;
    }

    header{
      display:flex;
      gap: 14px;
      align-items:flex-end;
      justify-content:space-between;
      flex-wrap:wrap;
      margin-bottom: 14px;
    }

    h1{
      margin:0;
      font-size: 22px;
      font-weight: 950;
      letter-spacing:.2px;
    }

    .sub{
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height:1.35;
      max-width: 760px;
    }

    .pill{
      border:1px solid var(--stroke);
      background: rgba(0,0,0,.22);
      border-radius: 999px;
      padding: 10px 12px;
      display:flex;
      gap: 10px;
      align-items:center;
    }
    .pill label{
      font-size: 12px;
      color: var(--muted);
    }
    .pill input{
      width: 220px;
      background: transparent;
      border:0;
      outline:0;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 14px;
    }
    @media (max-width: 980px){ .grid{ grid-template-columns: 1fr; } }

    .card{
      border:1px solid var(--stroke);
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(0,0,0,.16));
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 22px 70px var(--shadow);
      display:flex;
      flex-direction:column;
      gap: 10px;
    }

    h2{
      margin:0 0 6px;
      font-size: 16px;
      font-weight: 950;
      letter-spacing:.18px;
    }

    .field{
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      border-radius: 14px;
      padding: 10px 12px;
    }
    .field label{
      display:block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field input{
      width: 100%;
      border:0;
      outline:0;
      background: transparent;
      color: var(--text);
      font-size: 15px;
      font-weight: 800;
    }

    .rowBtns{
      display:flex;
      gap: 10px;
      flex-wrap:wrap;
    }

    button{
      border: 1px solid var(--stroke);
      background: rgba(0,0,0,.22);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 14px;
      cursor:pointer;
      font-weight: 900;
      letter-spacing:.2px;
      transition: transform .06s ease, background .15s ease, border-color .15s ease;
    }
    button:active{ transform: translateY(1px); }

    .btnPrimary{ border-color: rgba(96,165,250,.55); background: rgba(96,165,250,.18); }
    .btnPrimary:hover{ background: rgba(96,165,250,.26); }

    .btnDanger{ border-color: rgba(255,51,92,.55); background: rgba(255,51,92,.16); }
    .btnDanger:hover{ background: rgba(255,51,92,.24); }

    .btnWarn{ border-color: rgba(245,158,11,.55); background: rgba(245,158,11,.16); }
    .btnWarn:hover{ background: rgba(245,158,11,.24); }

    .btnGhost{ background: rgba(0,0,0,.16); }

    .history{
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.16);
      border-radius: 14px;
      padding: 10px 12px;
      max-height: 210px;
      overflow:auto;
    }

    .historyItem{
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,.06);
      cursor:pointer;
      font-size: 13px;
      color: rgba(255,255,255,.86);
    }
    .historyItem:last-child{ border-bottom:0; }
    .historyItem:hover{ color: var(--accent); }

    .countRow{
      display:flex;
      gap: 10px;
      flex-wrap:wrap;
      align-items:flex-end;
      margin-top: 12px;
    }
    .countRow .mini{
      width: 160px;
    }

    .preview{
      margin-top: 14px;
      border-radius: 18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
    }
    .previewBar{
      padding: 10px 12px;
      font-size: 12px;
      color: var(--muted);
      border-bottom:1px solid rgba(255,255,255,.08);
      display:flex;
      justify-content:space-between;
      gap: 10px;
      flex-wrap:wrap;
    }
    iframe{
      width:100%;
      height: 260px;
      border:0;
      background:#000;
    }

    footer{
      margin-top: 14px;
      color: var(--muted);
      font-size: 12px;
      border-top: 1px solid rgba(255,255,255,.10);
      padding-top: 12px;
      display:flex;
      gap: 12px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
    }

    .mono{ font-family: var(--mono); }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div>
        <h1>Speaker Control</h1>
        <div class="sub">Controla a mensagem principal, notas e countdown via MQTT. Usa <span class="mono">?room=nome</span> para separar salas.</div>
      </div>

      <div class="pill">
        <label for="room">room</label>
        <input id="room" type="text" value="default" />
      </div>
    </header>

    <div class="grid">

      <div class="card">
        <h2>Mensagem principal</h2>

        <div class="field">
          <label>Texto</label>
          <input id="msgInput" type="text" placeholder="Escreve a mensagem…">
        </div>

        <div class="rowBtns">
          <button class="btnPrimary" id="sendBtn">Enviar</button>
          <button class="btnDanger" id="alertBtn">🔴 Alerta geral</button>
        </div>

        <h2 style="margin-top:10px;">Histórico</h2>
        <div class="history" id="history"></div>
      </div>

      <div class="card">
        <h2>Notas</h2>

        <div class="field">
          <label>Texto</label>
          <input id="notesInput" type="text" placeholder="Ex: 120 pessoas a assistir…">
        </div>

        <div class="rowBtns">
          <button class="btnPrimary" id="sendNotesBtn">Atualizar</button>
          <button class="btnWarn" id="alertNotesBtn">🔶 Alerta notas</button>
        </div>

        <h2 style="margin-top:10px;">Histórico</h2>
        <div class="history" id="notesHistory"></div>
      </div>

    </div>

    <div class="card" style="margin-top:14px;">
      <h2>Countdown</h2>

      <div class="countRow">
        <div class="field mini">
          <label>Minutos</label>
          <input id="countdownInput" type="number" min="0" placeholder="min">
        </div>

        <div class="rowBtns">
          <button class="btnGhost" id="btnSetCountdown">Definir</button>
          <button class="btnGhost" id="btnStartCountdown">Iniciar</button>
          <button class="btnGhost" id="btnStopCountdown">Parar</button>
          <button class="btnGhost" id="btnResetCountdown">Reset</button>
        </div>
      </div>

      <div class="preview">
        <div class="previewBar">
          <div>Pré-visualização (display)</div>
          <div class="mono" id="status">A ligar…</div>
        </div>
        <iframe id="previewFrame" src=""></iframe>
      </div>
    </div>

    <footer>
      <div id="displayState"></div>
      <div class="mono" id="topics"></div>
    </footer>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="app-control.js"></script>
  </div>
</body>
</html>
