<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <title>Speaker Control</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
      background: #0d0d0d;
      color: #eeeeee;
    }

    h2, h3 {
      margin-top: 0;
      color: #ffffff;
    }

    input, button { font-family: inherit; }

    #topGrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
      margin-bottom: 30px;
    }

    #msgInput, #notesInput, #countdownInput {
      width: 100%;
      font-size: 18px;
      padding: 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #eee;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    #countdownInput { width: 120px; }

    button {
      padding: 12px 22px;
      font-size: 17px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-weight: 700;
      transition: 0.15s ease;
      margin-right: 8px;
      margin-top: 5px;
      letter-spacing: .2px;
    }

    #sendBtn, #sendNotesBtn { background: #007aff; }
    #sendBtn:hover, #sendNotesBtn:hover { background: #3399ff; }

    #alertBtn { background: #ff0033; }
    #alertBtn:hover { background: #ff335c; }

    #alertNotesBtn { background: #ff8800; }
    #alertNotesBtn:hover { background: #ffaa33; }

    #resetAllBtn{
      background:#2b2b2b;
      border:1px solid #555;
    }
    #resetAllBtn:hover{ background:#3a3a3a; }

    #btnSetCountdown, #btnStartCountdown, #btnStopCountdown, #btnResetCountdown {
      background: #444;
      border: 1px solid #666;
    }
    #btnSetCountdown:hover, #btnStartCountdown:hover, #btnStopCountdown:hover, #btnResetCountdown:hover {
      background: #666;
    }

    #history, #notesHistory {
      margin-top: 10px;
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #333;
      padding: 10px;
      border-radius: 6px;
      background: #181818;
    }

    .history-item {
      padding: 6px 0;
      cursor: pointer;
      border-bottom: 1px solid #222;
      font-size: 14px;
    }
    .history-item:hover { color: #0a84ff; }

    #previewContainer {
      margin-top: 30px;
      border: 1px solid #333;
      padding: 15px;
      border-radius: 6px;
      background: #111;
    }

    #preview {
      display: grid;
      grid-template-columns: 0.6fr 2.8fr 0.6fr;
      height: 200px;
      border: 1px solid #333;
      background: #000;
      color: #fff;
    }

    #pLeft, #pCenter, #pRight { padding: 10px; overflow: hidden; }

    #pLeft {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-right: 1px solid #333;
    }

    #pCenter {
      display: flex;
      justify-content: center;
      align-items: center;
      border-left: 1px solid #333;
      border-right: 1px solid #333;
      text-align: center;
      position: relative;
    }

    #pMainMsg { font-size: 22px; max-width: 90%; }

    #pRight {
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
    }

    .underlineTitle{
      text-decoration: underline;
      text-underline-offset: 5px;
      text-decoration-thickness: 2px;
    }

    /* ✅ ALARMES NA PREVIEW */
    .p-msg-blink{
      animation: pMsgBlink 3s linear forwards;
    }
    @keyframes pMsgBlink{
      0%   { background: transparent; }
      10%  { background: #8b0000; }
      20%  { background: transparent; }
      30%  { background: #8b0000; }
      40%  { background: transparent; }
      50%  { background: #8b0000; }
      60%  { background: transparent; }
      70%  { background: #8b0000; }
      80%  { background: transparent; }
      90%  { background: #8b0000; }
      100% { background: transparent; }
    }

    .p-notes-blink{
      animation: pNotesBlink 3s linear forwards;
    }
    @keyframes pNotesBlink{
      0%   { background: transparent; }
      10%  { background: #ff8800; }
      20%  { background: transparent; }
      30%  { background: #ff8800; }
      40%  { background: transparent; }
      50%  { background: #ff8800; }
      60%  { background: transparent; }
      70%  { background: #ff8800; }
      80%  { background: transparent; }
      90%  { background: #ff8800; }
      100% { background: transparent; }
    }

    #footerStatus {
      margin-top: 25px;
      padding-top: 15px;
      border-top: 1px solid #333;
      font-size: 14px;
      opacity: 0.85;
      display:flex;
      gap: 18px;
      flex-wrap:wrap;
      align-items:center;
    }

    #lastSync{
      opacity:.85;
    }
  </style>
</head>

<body>

  <h2>Speaker Control</h2>

  <div id="topGrid">

    <div>
      <h3>Mensagem principal</h3>
      <input id="msgInput" type="text" placeholder="Escreve a mensagem…">
      <button id="sendBtn">Enviar</button>
      <button id="alertBtn">ALERTA MENSAGEM</button>
      <button id="resetAllBtn">🧼 RESET TUDO</button>

      <h3>Histórico de mensagens</h3>
      <div id="history"></div>
    </div>

    <div>
      <h3 class="underlineTitle">NOTAS</h3>
      <input id="notesInput" type="text" placeholder="Ex: 120 pessoas a assistir…">
      <button id="sendNotesBtn">Atualizar notas</button>
      <button id="alertNotesBtn">🔶 ALERTA NOTAS</button>

      <h3>Histórico de notas</h3>
      <div id="notesHistory"></div>
    </div>

  </div>

  <h3>Countdown</h3>
  <input id="countdownInput" type="number" min="0" placeholder="min">
  <button id="btnSetCountdown">Definir</button>
  <button id="btnStartCountdown">Iniciar</button>
  <button id="btnStopCountdown">Parar</button>
  <button id="btnResetCountdown">Reset</button>

  <div id="previewContainer">
    <h3>Pré-visualização</h3>
    <div id="preview">
      <div id="pLeft">
        <div id="pClock">--:--:--</div>
        <div id="pCountdown">--:--</div>
      </div>

      <div id="pCenter">
        <div id="pMainMsg">Aguardando…</div>
      </div>

      <div id="pRight">
        <div class="underlineTitle" style="font-weight:700;opacity:0.85;">NOTAS</div>
        <div id="pNotesText">Sem notas.</div>
      </div>
    </div>
  </div>

  <div id="footerStatus">
    <div id="status">A ligar ao servidor…</div>
    <div id="displayState"></div>
    <div id="lastSync">Última sync: —</div>
  </div>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script src="app-control.js"></script>

</body>
</html>
